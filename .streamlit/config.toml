[server]
enableXsrfProtection = false
maxUploadSize = 200
# Tránh lỗi PyTorch khi Streamlit quét import: "torch.classes ... does not exist"
fileWatcherType = "none"

[theme]
base = "light"
primaryColor = "#7c3aed"
backgroundColor = "#f9f9f9"
secondaryBackgroundColor = "#ffffff"
textColor = "#000000"
font = "sans serif"
